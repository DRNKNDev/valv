# Release runbook:
# 1. Bump crates/valv-cli/Cargo.toml (for cli-v*) or crates/valvd/Cargo.toml (for valvd-v*)
#    to the new semver. macos-v* is not built by this workflow; see oss/macos/scripts/release-app.sh.
# 2. From the private repo, run tooling/mirror/pull.sh, then tooling/mirror/push.sh.
# 3. Tag cli-v<semver> or valvd-v<semver> on the public remote after the mirror push; never tag the
#    private repo for public releases, because this workflow only publishes from DRNKNDev/valv.

name: Release

on:
  push:
    tags:
      - "cli-v*"
      - "valvd-v*"
      - "macos-v*"

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crates
    outputs:
      version: ${{ steps.guard.outputs.version }}
      component: ${{ steps.guard.outputs.component }}
    steps:
      - uses: actions/checkout@v4
      - id: guard
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          semver='[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?'
          if [[ "${tag}" =~ ^cli-v(${semver})$ ]]; then
            component="valv"
            crate_path="valv-cli/Cargo.toml"
          elif [[ "${tag}" =~ ^valvd-v(${semver})$ ]]; then
            component="valvd"
            crate_path="valvd/Cargo.toml"
          elif [[ "${tag}" =~ ^macos-v(${semver})$ ]]; then
            component="macos"
            crate_path=""
          else
            echo "Release tags must use cli-v<semver>, valvd-v<semver>, or macos-v<semver>; got ${tag}" >&2
            exit 1
          fi
          version="${BASH_REMATCH[1]}"
          if [[ -n "${crate_path}" ]]; then
            crate_version="$(awk -F '"' '/^version = / { print $2; exit }' "${crate_path}")"
            if [[ "${crate_version}" != "${version}" ]]; then
              echo "Tag ${tag} does not match ${crate_path}'s version (${crate_version})" >&2
              exit 1
            fi
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "component=${component}" >> "${GITHUB_OUTPUT}"

  build:
    needs: version
    if: needs.version.outputs.component != 'macos'
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: crates
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ needs.version.outputs.component }}" == "valv" ]]; then
            cargo build --release -p valv-cli --target ${{ matrix.target }}
          else
            cargo build --release -p valvd --target ${{ matrix.target }}
          fi
      - name: Package binary
        shell: bash
        run: |
          set -euo pipefail
          component="${{ needs.version.outputs.component }}"
          version="${{ needs.version.outputs.version }}"
          target="${{ matrix.target }}"
          if [[ "${component}" == "valv" ]]; then
            binary="valv"
          else
            binary="valvd"
          fi
          asset="${component}-${version}-${target}.tar.gz"
          mkdir -p ../dist
          tar -C "target/${target}/release" -czf "../dist/${asset}" "${binary}"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ needs.version.outputs.component }}-${{ needs.version.outputs.version }}-${{ matrix.target }}
          path: dist/${{ needs.version.outputs.component }}-${{ needs.version.outputs.version }}-${{ matrix.target }}.tar.gz
          if-no-files-found: error

  publish:
    needs:
      - version
      - build
    if: needs.version.outputs.component != 'macos'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Generate checksum manifest
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          sha256sum ${{ needs.version.outputs.component }}-${{ needs.version.outputs.version }}-*.tar.gz > SHA256SUMS
      - name: Install minisign
        run: sudo apt-get update && sudo apt-get install -y minisign
      - name: Sign checksum manifest
        shell: bash
        env:
          MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}
        run: |
          set -euo pipefail
          [[ -n "${MINISIGN_SECRET_KEY}" ]] || {
            echo "MINISIGN_SECRET_KEY secret is not set - see design.md D2" >&2
            exit 1
          }
          key_file="$(mktemp)"
          trap 'rm -f "${key_file}"' EXIT
          printf '%s\n' "${MINISIGN_SECRET_KEY}" > "${key_file}"
          minisign -S -s "${key_file}" -m dist/SHA256SUMS -x dist/SHA256SUMS.minisig \
            -t "${{ needs.version.outputs.component }} release ${{ github.ref_name }}"
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: |
            dist/${{ needs.version.outputs.component }}-${{ needs.version.outputs.version }}-aarch64-apple-darwin.tar.gz
            dist/${{ needs.version.outputs.component }}-${{ needs.version.outputs.version }}-x86_64-unknown-linux-gnu.tar.gz
            dist/SHA256SUMS
            dist/SHA256SUMS.minisig
