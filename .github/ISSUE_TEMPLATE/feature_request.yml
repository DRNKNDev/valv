name: Feature Request
description: Propose a concrete feature or improvement for Valv.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        For open-ended ideas or discussion before a concrete proposal, consider starting a thread
        on [Discord](https://discord.gg/29a3dVRdE) instead.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve, or what is missing today?
    validations:
      required: true

  - type: textarea
    id: outcome
    attributes:
      label: Proposed outcome
      description: What should happen instead? Be as concrete as you can.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or other approaches you've considered.

  - type: dropdown
    id: surface
    attributes:
      label: Affected surface
      options:
        - macOS app (Finder integration / menu bar)
        - File Provider extension
        - CLI (valv)
        - Daemon (valvd)
        - Backend (core)
        - Other / not sure
    validations:
      required: true
